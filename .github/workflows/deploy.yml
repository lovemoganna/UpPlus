name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:export
        env:
          NEXT_PUBLIC_BASE_PATH: "/UpPlus"

      - name: Override 404.html for SPA routing
        run: |
          cat > out/404.html << 'HTML'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>UpPlus</title>
            <script>
              (function() {
                var basePath = "/UpPlus";
                var path = location.pathname.replace(basePath, "") || "/";
                if (!path.endsWith("/") && !path.includes(".")) path += "/";
                if (path !== "/" && path !== "") {
                  sessionStorage.setItem("__spa_redirect", path);
                }
                location.replace(basePath + "/");
              })();
            </script>
          </head>
          <body></body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
